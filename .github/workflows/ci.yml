# AI Builder School — Continuous Integration
#
# Harness Engineering · Feedback Loop (외부 게이트).
# 로컬 lefthook과 같은 게이트를 push/PR마다 다시 한번 강제.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint · Typecheck · Validate · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install (no audit)
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate content
        run: npm run validate

      - name: Build
        run: npm run build
        env:
          # CI에서는 일반 .next/ 사용 (iCloud 회피 필요 없음)
          USE_DEFAULT_DIST: "1"

  eval:
    name: Lesson quality (advisory)
    runs-on: ubuntu-latest
    # check 실패해도 eval은 진행 — 학습 자료 측면에서 advisory만
    needs: []
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Eval lessons
        run: npm run eval
