# AI Builder School — Harness Engineering · Feedback Loop
#
# pre-commit 시 머신이 강제하는 게이트.
# 이 학교가 가르치는 원리를 학교 자신이 따르는 도그푸딩의 일부.
#
# 도구 변경: lefthook (https://github.com/evilmartians/lefthook)
# 설치 후 한 번 실행: `npx lefthook install`

pre-commit:
  parallel: true
  commands:
    typecheck:
      run: npm run typecheck
      tags: gate
    validate-content:
      run: npm run validate
      tags: gate

# pre-push 는 빌드까지 포함해 더 무거운 게이트로 운영한다.
# 빠른 반복을 위해 commit 단계는 typecheck + validate 만 강제한다.
pre-push:
  commands:
    full-check:
      run: npm run check
      tags: heavy

# Skip patterns
# - .next.nosync 변경은 무시 (빌드 산출물)
# - node_modules 무시
skip_output:
  - meta
  - summary

# post-commit auto-push — main 브랜치는 보호하고 feature branch만 자동 푸시
# pre-push의 npm run check 게이트가 그대로 작동해 검증 실패 시 푸시 거부됨
post-commit:
  commands:
    auto-push:
      run: |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [ "$BRANCH" = "main" ]; then
          echo "main 브랜치는 수동 푸시 권장 — skip"
          exit 0
        fi
        if git rev-parse --abbrev-ref --symbolic-full-name @{u} >/dev/null 2>&1; then
          git push
        else
          git push -u origin "$BRANCH"
        fi
      tags: convenience
