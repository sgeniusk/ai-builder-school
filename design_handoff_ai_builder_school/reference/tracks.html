<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>트랙 · AI Builder School</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="assets/theme.css?v=3">
<link rel="stylesheet" href="assets/layout.css?v=2">
<link rel="stylesheet" href="assets/pages.css?v=2">
<script src="assets/content.js?v=2" defer></script>
<script src="assets/layout.js?v=2" defer></script>
</head>
<body>
<section class="page-head">
  <div class="wrap">
    <p class="eyebrow">Tracks · 5</p>
    <h1>당신의 출발점에서<br>시작한다.</h1>
    <p class="lede">5개의 페르소나 트랙 중 하나를 고르면, 필수 Phase와 선택 Phase가 자동으로 구성됩니다. 각 트랙은 6–10주 안에 완주하도록 설계되어 있습니다.</p>
  </div>
</section>

<section class="sec">
  <div class="wrap" id="tracks"></div>
</section>

<script>
(function(){
  function ready(fn){ if(window.ABS_CONTENT) fn(); else setTimeout(()=>ready(fn),20); }
  ready(() => {
    const C = window.ABS_CONTENT;
    const root = document.getElementById('tracks');
    root.innerHTML = C.tracks.map(t => {
      const req = t.required.map(id => C.phases.find(p=>p.id===id)).filter(Boolean);
      const opt = (t.optional||[]).map(id => C.phases.find(p=>p.id===id)).filter(Boolean);
      return `
        <article class="track-full" id="${t.slug}">
          <div>
            <div class="persona">${t.persona}</div>
            <h2>${t.title}</h2>
            <p class="meta">${t.weeks}주 · 필수 ${req.length} · 선택 ${opt.length}</p>
          </div>
          <div>
            <p class="desc"><strong>${t.learner}</strong></p>
            <p class="desc" style="margin-top:8px;">${t.promise}</p>
            <div class="ph-list">
              ${req.map(p=>`<span class="chip">P${p.num} · ${p.titleKo}</span>`).join('')}
              ${opt.map(p=>`<span class="chip is-optional">P${p.num} · ${p.titleKo}</span>`).join('')}
            </div>
            <div class="outcome">최종 산출물 — ${t.outcome}</div>
          </div>
        </article>
      `;
    }).join('');
  });
})();
</script>
</body>
</html>
