<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>템플릿 · AI Builder School</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="assets/theme.css?v=3">
<link rel="stylesheet" href="assets/layout.css?v=2">
<link rel="stylesheet" href="assets/pages.css?v=2">
<script src="assets/content.js?v=2" defer></script>
<script src="assets/layout.js?v=2" defer></script>
</head>
<body>
<section class="page-head">
  <div class="wrap">
    <p class="eyebrow">Templates</p>
    <h1>바로 쓰는 템플릿 8.</h1>
    <p class="lede">프롬프트 · 미션 · 체크리스트 세 종류. 각 레슨에서 가져다 쓸 수 있도록 파일로 제공됩니다.</p>
  </div>
</section>

<section class="sec">
  <div class="wrap">
    <div class="filter-bar" id="filter">
      <button class="is-active" data-f="all">전체</button>
      <button data-f="prompt">프롬프트</button>
      <button data-f="mission">미션</button>
      <button data-f="checklist">체크리스트</button>
    </div>
    <div class="proj-grid" id="templates"></div>
  </div>
</section>

<script>
(function(){
  function ready(fn){ if(window.ABS_CONTENT) fn(); else setTimeout(()=>ready(fn),20); }
  ready(() => {
    const C = window.ABS_CONTENT;
    const root = document.getElementById('templates');
    function render(f){
      const items = C.templates.filter(t => f==='all' || t.kind===f);
      root.innerHTML = items.map(t => `
        <a class="card proj-card" href="#">
          <div class="tag-row">
            <span class="tag">${t.kind}</span>
            <span class="tag">${(t.personas||[]).join(' · ')}</span>
          </div>
          <h3>${t.title}</h3>
          <p>${t.summary}</p>
        </a>
      `).join('');
    }
    render('all');
    document.getElementById('filter').addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      document.querySelectorAll('#filter button').forEach(x=>x.classList.remove('is-active'));
      b.classList.add('is-active');
      render(b.dataset.f);
    });
  });
})();
</script>
</body>
</html>
