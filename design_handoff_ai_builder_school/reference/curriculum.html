<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>커리큘럼 · AI Builder School</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="assets/theme.css?v=3">
<link rel="stylesheet" href="assets/layout.css?v=2">
<link rel="stylesheet" href="assets/pages.css?v=2">
<script src="assets/content.js?v=2" defer></script>
<script src="assets/layout.js?v=2" defer></script>
</head>
<body>
<section class="page-head">
  <div class="wrap">
    <p class="eyebrow">Curriculum · 12 Phases</p>
    <h1>기초부터 Capstone까지,<br>12개의 Phase.</h1>
    <p class="lede">각 Phase는 레슨 3–6개와 하나의 산출물로 구성됩니다. 8주 MVP 경로는 7·8번으로 표시된 카드만 따라가면 완주합니다.</p>
  </div>
</section>

<section class="sec">
  <div class="wrap">
    <div class="filter-bar" id="filter">
      <button class="is-active" data-f="all">전체</button>
      <button data-f="beginner">입문</button>
      <button data-f="intermediate">중급</button>
      <button data-f="advanced">심화</button>
      <button data-f="mvp">8주 MVP만</button>
    </div>
    <div class="phases-grid" id="phases"></div>
  </div>
</section>

<script>
(function(){
  function ready(fn){ if(window.ABS_CONTENT) fn(); else setTimeout(()=>ready(fn),20); }
  ready(() => {
    const C = window.ABS_CONTENT;
    const root = document.getElementById('phases');
    function render(filter){
      const items = C.phases.filter(p => {
        if (filter === 'all') return true;
        if (filter === 'mvp') return !!p.week;
        return p.level === filter;
      });
      root.innerHTML = items.map(p => `
        <a class="card phase-card" href="phase.html?slug=${p.slug}">
          <div>
            <div class="ph-top">
              <span class="ph-num">PHASE ${p.num}</span>
              <span class="ph-wk">${p.week?`WEEK ${String(p.week).padStart(2,'0')}`:'OPTIONAL'}</span>
            </div>
            <h3>${p.titleKo}</h3>
            <p>${p.summary}</p>
          </div>
          <div class="ph-meta"><span>${p.hours}h</span><span>·</span><span>${p.level}</span></div>
        </a>
      `).join('');
    }
    render('all');
    document.getElementById('filter').addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      document.querySelectorAll('#filter button').forEach(x=>x.classList.remove('is-active'));
      b.classList.add('is-active');
      render(b.dataset.f);
    });
  });
})();
</script>
</body>
</html>
