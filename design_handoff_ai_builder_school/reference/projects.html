<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>프로젝트 · AI Builder School</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="assets/theme.css?v=3">
<link rel="stylesheet" href="assets/layout.css?v=2">
<link rel="stylesheet" href="assets/pages.css?v=2">
<script src="assets/content.js?v=2" defer></script>
<script src="assets/layout.js?v=2" defer></script>
</head>
<body>
<section class="page-head">
  <div class="wrap">
    <p class="eyebrow">Projects</p>
    <h1>만들 수 있는 것들.</h1>
    <p class="lede">Capstone 전에 만드는 연습용 프로젝트. 각 프로젝트는 하나의 Phase에 1:1로 대응됩니다.</p>
  </div>
</section>

<section class="sec">
  <div class="wrap">
    <div class="filter-bar" id="filter">
      <button class="is-active" data-f="all">전체</button>
      <button data-f="beginner">입문</button>
      <button data-f="intermediate">중급</button>
      <button data-f="advanced">심화</button>
    </div>
    <div class="proj-grid" id="projects"></div>
  </div>
</section>

<script>
(function(){
  function ready(fn){ if(window.ABS_CONTENT) fn(); else setTimeout(()=>ready(fn),20); }
  ready(() => {
    const C = window.ABS_CONTENT;
    const root = document.getElementById('projects');
    function render(f){
      const items = C.projects.filter(p => f==='all' || p.difficulty===f);
      root.innerHTML = items.map(p => `
        <a class="card proj-card" href="#">
          <div class="tag-row">
            <span class="tag">${p.difficulty}</span>
            <span class="tag">${p.persona}</span>
          </div>
          <h3>${p.title}</h3>
          <p>${p.summary}</p>
          <div class="stack">${p.stack.map(s=>`<span>${s}</span>`).join(' · ')}</div>
        </a>
      `).join('');
    }
    render('all');
    document.getElementById('filter').addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      document.querySelectorAll('#filter button').forEach(x=>x.classList.remove('is-active'));
      b.classList.add('is-active');
      render(b.dataset.f);
    });
  });
})();
</script>
</body>
</html>
