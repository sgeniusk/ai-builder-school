<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase · AI Builder School</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="assets/theme.css?v=3">
<link rel="stylesheet" href="assets/layout.css?v=2">
<link rel="stylesheet" href="assets/pages.css?v=2">
<script src="assets/content.js?v=2" defer></script>
<script src="assets/layout.js?v=2" defer></script>
</head>
<body>
<section class="phase-hero" id="head">
  <div class="wrap"></div>
</section>

<section class="sec">
  <div class="wrap">
    <p class="eyebrow">Lessons</p>
    <h2 class="section-title" style="font-size: clamp(26px, 3.2vw, 36px);">이 Phase의 레슨</h2>
    <ol class="lessons-list" id="lessons"></ol>

    <div id="deliverables" style="margin-top: 64px;"></div>
  </div>
</section>

<script>
(function(){
  function ready(fn){ if(window.ABS_CONTENT) fn(); else setTimeout(()=>ready(fn),20); }
  ready(() => {
    const C = window.ABS_CONTENT;
    const qs = new URLSearchParams(location.search);
    const slug = qs.get('slug') || 'phase-1-ai-literacy';
    const p = C.phases.find(x => x.slug === slug) || C.phases[1];

    document.getElementById('head').querySelector('.wrap').innerHTML = `
      <div class="nums">
        <span>PHASE ${p.num}</span>
        <span>${p.week ? 'WEEK ' + String(p.week).padStart(2,'0') : 'OPTIONAL'}</span>
        <span>${p.level}</span>
      </div>
      <h1>${p.titleKo}</h1>
      <p class="lede">${p.summary}</p>
      <div class="phase-meta">
        <div><div class="lbl">Hours</div><div class="val">${p.hours}</div></div>
        <div><div class="lbl">Lessons</div><div class="val">${C.lessons.filter(l=>l.phaseId===p.id).length}</div></div>
        <div><div class="lbl">Level</div><div class="val">${p.level}</div></div>
        <div><div class="lbl">English</div><div class="val">${p.titleEn}</div></div>
      </div>
    `;

    const lessons = C.lessons.filter(l => l.phaseId === p.id);
    const llist = document.getElementById('lessons');
    if (lessons.length === 0) {
      llist.innerHTML = `<li style="color: var(--ink-3); cursor:default; display:block; padding: 24px 0;">이 Phase의 레슨은 준비 중입니다.</li>`;
    } else {
      llist.innerHTML = lessons.map(l => `
        <li onclick="location.href='lesson.html?slug=${l.slug}'">
          <span class="l-num">${l.num}</span>
          <span class="l-title">${l.titleKo}</span>
          <span class="l-meta">${l.minutes}분 · ${l.level}</span>
        </li>
      `).join('');
    }

    document.getElementById('deliverables').innerHTML = `
      <p class="eyebrow">Deliverables</p>
      <h2 class="section-title" style="font-size: clamp(26px, 3.2vw, 36px);">이 Phase를 끝내면 남는 것</h2>
      <ul class="checklist" style="max-width: 60ch;">
        ${p.deliverables.map(d => `<li>${d}</li>`).join('')}
      </ul>
    `;
  });
})();
</script>
</body>
</html>
